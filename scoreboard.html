<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Star Race Scoreboard</title>
  <meta name="theme-color" content="#1cb0f6">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@600;750;850;900&display=swap');

    :root{
      --green:#58cc02;
      --blue:#1cb0f6;
      --gold:#ffc800;
      --orange:#ff9600;
      --ink:#14233a;
      --muted:#5c718c;
      --line:#dbe7f4;
      --star-full:url("Assets/star-full.png");
      --star-empty:url("Assets/star-empty.png");
      --chest-open:url("Assets/chest-open.png");
    }

    *{box-sizing:border-box}
    html,body{min-height:100%}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at 18% 8%, rgba(255,200,0,.26), transparent 24%),
        radial-gradient(circle at 84% 10%, rgba(28,176,246,.24), transparent 26%),
        linear-gradient(180deg,#f7fcff 0%,#eef8ff 50%,#fff9e8 100%);
    }

    .screen{min-height:100vh;padding:24px;max-width:1180px;margin:0 auto}
    .hero{
      display:flex;align-items:center;justify-content:space-between;gap:18px;
      padding:20px 22px;margin-bottom:18px;
      background:rgba(255,255,255,.84);
      border:1px solid rgba(219,231,244,.9);
      border-radius:22px;
      box-shadow:0 16px 36px rgba(31,42,68,.12);
    }
    .title{display:flex;align-items:center;gap:16px;min-width:0}
    .badge{
      width:68px;height:68px;border-radius:22px;
      background:linear-gradient(135deg,var(--green),var(--blue));
      display:grid;place-items:center;
      box-shadow:0 12px 24px rgba(28,176,246,.22);
      flex:0 0 auto;
    }
    .badge:before{
      content:"";width:42px;height:42px;
      background:var(--star-full) center/contain no-repeat;
      filter:drop-shadow(0 5px 4px rgba(0,0,0,.16));
    }
    h1{margin:0;font-size:42px;line-height:1;font-weight:900;letter-spacing:0}
    .sub{margin:7px 0 0;color:var(--muted);font-size:16px;font-weight:850}
    .goal{
      min-width:132px;padding:12px 16px;border-radius:18px;
      background:#14233a;color:#fff;text-align:center;font-weight:900;
      box-shadow:0 12px 24px rgba(20,35,58,.16);
    }
    .goal span{display:block;color:#aab8ca;font-size:12px;text-transform:uppercase;letter-spacing:.06em}
    .goal strong{display:block;font-size:30px;line-height:1.1}

    .rows{display:flex;flex-direction:column;gap:12px}
    .row{
      display:grid;
      grid-template-columns:66px 74px minmax(220px,1fr) minmax(300px,1.2fr) 104px;
      align-items:center;gap:14px;
      min-height:104px;padding:14px 16px;
      background:rgba(255,255,255,.92);
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:0 12px 26px rgba(31,42,68,.10);
    }
    .row.top1{border-color:rgba(255,200,0,.72);box-shadow:0 18px 36px rgba(255,150,0,.18)}
    .rank{
      width:56px;height:56px;border-radius:18px;
      display:grid;place-items:center;
      background:#f0f6fd;border:1px solid var(--line);
      color:#52627a;font-size:24px;font-weight:900;
    }
    .top1 .rank{background:linear-gradient(180deg,#fff3a0,var(--gold));color:#8a5200;border-color:#edae00}
    .top2 .rank{background:linear-gradient(180deg,#eaf7ff,#bce7ff);color:#086fa9;border-color:#9bd9ff}
    .top3 .rank{background:linear-gradient(180deg,#fff1e7,#ffd0ba);color:#9a4c20;border-color:#ffbd9d}
    .avatar{
      width:70px;height:70px;border-radius:50%;object-fit:cover;background:#fff;
      border:5px solid #fff;
      box-shadow:0 10px 22px rgba(31,42,68,.15),0 0 0 3px rgba(28,176,246,.12);
    }
    .name{font-size:24px;font-weight:900;line-height:1.08;overflow-wrap:anywhere}
    .progress{display:flex;flex-direction:column;gap:9px;min-width:0}
    .stars{display:flex;align-items:center;gap:7px}
    .star{
      width:48px;height:48px;position:relative;display:inline-block;flex:0 0 auto;
      background:var(--star-empty) center/contain no-repeat;
    }
    .star:before{
      content:"";position:absolute;inset:0;
      background:var(--star-full) center/contain no-repeat;
      clip-path:inset(0 calc(100% - var(--fill,0%)) 0 0);
      filter:saturate(calc(.55 + var(--color,0) * .012)) brightness(calc(.92 + var(--color,0) * .002));
    }
    .bar{height:10px;border-radius:999px;background:#e7eef7;overflow:hidden}
    .bar span{
      display:block;height:100%;width:0;border-radius:inherit;
      background:linear-gradient(90deg,var(--green),var(--gold),var(--orange));
      transition:width .35s ease;
    }
    .score{
      min-height:58px;border-radius:18px;background:#14233a;color:#fff;
      display:grid;place-items:center;
      font-size:30px;font-weight:900;
      box-shadow:0 12px 22px rgba(20,35,58,.16);
    }
    .score small{font-size:12px;color:#aab8ca;margin-left:3px}
    .complete .score:after{
      content:"";width:34px;height:30px;margin-left:7px;
      background:var(--chest-open) center/contain no-repeat;
      display:inline-block;
    }
    .empty{
      min-height:320px;display:grid;place-items:center;
      color:var(--muted);font-size:24px;font-weight:900;text-align:center;
    }

    @media (max-width:840px){
      .screen{padding:12px}
      .hero{align-items:flex-start;flex-direction:column}
      h1{font-size:32px}
      .goal{width:100%}
      .row{
        grid-template-columns:48px 56px minmax(0,1fr) 82px;
        gap:10px;padding:12px;border-radius:18px;
      }
      .rank{width:46px;height:46px;border-radius:15px;font-size:19px}
      .avatar{width:54px;height:54px;border-width:4px}
      .name{font-size:18px}
      .progress{grid-column:1/-1}
      .stars{gap:4px}
      .star{width:34px;height:34px}
      .score{min-height:48px;font-size:22px}
    }
  </style>
</head>
<body>
  <main class="screen">
    <header class="hero">
      <div class="title">
        <div class="badge"></div>
        <div>
          <h1>Star Race</h1>
          <p class="sub" id="statusText">Ranking do mês</p>
        </div>
      </div>
      <div class="goal"><span>Meta</span><strong id="goalText">60</strong></div>
    </header>

    <section class="rows" id="rows">
      <div class="empty">Carregando pontuação</div>
    </section>
  </main>

  <script>
    const APP = {
      BACKEND_URL: "https://script.google.com/macros/s/AKfycbzD-JuH-rfmq98rVGro5vqPBMGOdgHOTw-U2ZnV2g3h_mgxCQw4xTUQmFBrlMYNQR-mJw/exec",
      LOCAL_STORAGE_KEY: "starRaceEnglishClassV1",
      DEFAULT_MONTH_GOAL: 60,
      STUDENTS: [
        {id:"STU001",name:"Anna Beatriz Rodrigues de Souza Guerra",photo:"Assets/students/anna-beatriz-rodrigues-de-souza-guerra.png",active:true},
        {id:"STU002",name:"Davi Roberto dos Santos Silva",photo:"Assets/students/davi-roberto-dos-santos-silva.png",active:true},
        {id:"STU003",name:"Helena Oldsey da Paixão Santos",photo:"Assets/students/helena-oldsey-da-paixao-santos.png",active:true},
        {id:"STU004",name:"Isadora Ulisses Novaes Angelim",photo:"Assets/students/isadora-ulisses-novaes-angelim.png",active:true},
        {id:"STU005",name:"Júlia Beatriz da Silva",photo:"Assets/students/julia-beatriz-da-silva.png",active:true},
        {id:"STU006",name:"Letícia Santos Sena",photo:"Assets/students/leticia-santos-sena.png",active:true},
        {id:"STU007",name:"Luiz Henrique Lins de Albuquerque Maranhão",photo:"Assets/students/luiz-henrique-lins-de-albuquerque-maranhao.png",active:true},
        {id:"STU008",name:"Maria Alice Vasconcelos Silva",photo:"Assets/students/maria-alice-vasconcelos-silva.png",active:true},
        {id:"STU009",name:"Mariana Vasconcelos de Souza",photo:"Assets/students/mariana-vasconcelos-de-souza.png",active:true},
        {id:"STU010",name:"Maya Tenório Mascarenhas",photo:"Assets/students/maya-tenorio-mascarenhas.png",active:true},
        {id:"STU011",name:"Pedro Nathan de Vasconcelos Silva",photo:"Assets/students/pedro-nathan-de-vasconcelos-silva.png",active:true},
        {id:"STU012",name:"Sophia Bezerra Soares",photo:"Assets/students/sophia-bezerra-soares.png",active:true},
        {id:"STU013",name:"Yasmim Gomes Paes Barreto",photo:"Assets/students/yasmim-gomes-paes-barreto.png",active:true}
      ]
    };

    const state = {
      rows: [],
      goal: APP.DEFAULT_MONTH_GOAL,
      monthKey: monthKey(new Date())
    };

    const $ = (id) => document.getElementById(id);

    function monthKey(date){
      const y = date.getFullYear();
      const m = String(date.getMonth()+1).padStart(2,"0");
      return `${y}-${m}`;
    }

    function isBackendConfigured(){
      return APP.BACKEND_URL && !APP.BACKEND_URL.includes("COLE_AQUI");
    }

    function normalizeName(name){
      return String(name || "").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase();
    }

    function safeText(str){
      return String(str ?? "").replace(/[&<>"']/g, (m) => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[m]));
    }

    function jsonp(params){
      return new Promise((resolve,reject)=>{
        const cb = "score_cb_" + Date.now() + "_" + Math.floor(Math.random()*99999);
        const url = new URL(APP.BACKEND_URL);
        Object.entries(params || {}).forEach(([k,v]) => url.searchParams.set(k,v));
        url.searchParams.set("callback", cb);
        const script = document.createElement("script");
        const timer = setTimeout(()=>{
          cleanup();
          reject(new Error("Tempo esgotado"));
        }, 12000);
        function cleanup(){
          clearTimeout(timer);
          delete window[cb];
          script.remove();
        }
        window[cb] = (data) => {
          cleanup();
          resolve(data);
        };
        script.onerror = () => {
          cleanup();
          reject(new Error("Falha ao carregar dados"));
        };
        script.src = url.toString();
        document.body.appendChild(script);
      });
    }

    function getLocal(){
      const raw = localStorage.getItem(APP.LOCAL_STORAGE_KEY);
      if(raw){
        try{return JSON.parse(raw)}catch(e){}
      }
      return {students:APP.STUDENTS, points:[], goal:APP.DEFAULT_MONTH_GOAL};
    }

    function localData(){
      const data = getLocal();
      const totals = new Map();
      const events = data.points.filter(p => p.monthKey === state.monthKey);
      data.students.forEach(st => totals.set(st.id, 0));
      events.forEach(p => totals.set(p.studentId, (totals.get(p.studentId) || 0) + Number(p.points || 0)));
      const rows = data.students
        .filter(s => s.active !== false)
        .map(s => ({...s, score:totals.get(s.id) || 0}))
        .sort(sortRows)
        .map((s,i)=>({...s, rank:i+1}));
      return {rows, monthGoal:data.goal || APP.DEFAULT_MONTH_GOAL};
    }

    function sortRows(a,b){
      return (Number(b.score || 0) - Number(a.score || 0)) || normalizeName(a.name).localeCompare(normalizeName(b.name));
    }

    async function loadData(){
      if(isBackendConfigured()){
        try{
          const data = await jsonp({action:"summary", monthKey:state.monthKey});
          state.rows = data.rows || [];
          state.goal = Number(data.monthGoal || APP.DEFAULT_MONTH_GOAL);
          $("statusText").textContent = "Ranking do mês";
          render();
          return;
        }catch(err){
          $("statusText").textContent = "Ranking local";
        }
      }
      const data = localData();
      state.rows = data.rows;
      state.goal = Number(data.monthGoal || APP.DEFAULT_MONTH_GOAL);
      render();
    }

    function progressStars(progress){
      const safeProgress = Math.min(100, Math.max(0, Number(progress || 0)));
      return Array.from({length:5}, (_, index) => {
        const fill = Math.min(100, Math.max(0, (safeProgress - index * 20) * 5));
        return `<span class="star" style="--fill:${fill}%;--color:${safeProgress}"></span>`;
      }).join("");
    }

    function render(){
      $("goalText").textContent = state.goal;
      if(!state.rows.length){
        $("rows").innerHTML = `<div class="empty">Sem pontuação neste mês</div>`;
        return;
      }
      $("rows").innerHTML = state.rows.map(row => {
        const score = Number(row.score || 0);
        const progress = Math.min(100, Math.max(0, Math.round((score / state.goal) * 100)));
        const top = row.rank <= 3 ? `top${row.rank}` : "";
        const complete = progress >= 100 ? "complete" : "";
        return `
          <article class="row ${top} ${complete}">
            <div class="rank">${row.rank}</div>
            <img class="avatar" src="${safeText(row.photo)}" alt="${safeText(row.name)}">
            <div class="name">${safeText(row.name)}</div>
            <div class="progress">
              <div class="stars" aria-label="${progress}% da meta">${progressStars(progress)}</div>
              <div class="bar"><span style="width:${progress}%"></span></div>
            </div>
            <div class="score">${score}<small>pts</small></div>
          </article>
        `;
      }).join("");
    }

    window.addEventListener("storage", (event) => {
      if(event.key === APP.LOCAL_STORAGE_KEY) loadData();
    });

    loadData();
    setInterval(loadData, 8000);
  </script>
</body>
</html>
